<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reco-Ciclo Mario</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

  <!-- Fondo desplazable -->
  <div id="background"></div>

  <!-- Contador -->
  <div id="score">Latas: 0</div>

  <!-- Personaje animado -->
  <div id="player"></div>

  <!-- Lata -->
  <div id="can"></div>

  <!-- Mensaje final -->
  <div id="message"></div>

</div>

<!-- Botones -->
<div class="controls">
  <button id="collectBtn">🗑️ Recoger</button>
  <button id="jumpBtn">⬆️ Saltar</button>
</div>

<script src="script.js"></script>
</body>
</html>
