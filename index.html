<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reco-Ciclo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">

  <!-- Fondo -->
  <div id="background"></div>

  <!-- Contador de latas -->
  <div id="score">Latas: 0</div>

  <!-- Personaje -->
  <div id="player"></div>

  <!-- Latas (se generan dinámicamente) -->
  <div id="cansContainer"></div>

  <!-- Mensaje de logro -->
  <div id="message"></div>

</div>

<!-- Controles -->
<div class="controls">
  <button id="jumpBtn">⬆️ Saltar</button>
  <button id="collectBtn">🗑️ Recoger</button>
</div>

<script src="script.js"></script>
</body>
</html>
